<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mezuniyet Takip</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    padding:15px;
}

/* Açılış Video */

#videoEkran{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#videoEkran video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Ana Site */

#site{
    display:none;
}

h1{
    text-align:center;
    margin-bottom:18px;
    font-size:28px;
    font-weight:800;
}

.ust{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

input{
    flex:1;
    background:#1b1b1b;
    border:none;
    color:white;
    padding:14px;
    border-radius:14px;
    outline:none;
    font-size:15px;
}

input::placeholder{
    color:#888;
}

.ekleBtn{
    background:linear-gradient(45deg,#00b894,#00cec9);
    border:none;
    color:white;
    padding:14px 18px;
    border-radius:14px;
    font-weight:bold;
    cursor:pointer;
}

.arama{
    width:100%;
    margin-bottom:16px;
}

/* İstatistik */

.istatistik{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:18px;
}

.kart{
    background:#171717;
    border:1px solid #2a2a2a;
    border-radius:18px;
    padding:14px;
    text-align:center;
}

.kart p{
    color:#999;
    font-size:13px;
    margin-bottom:6px;
}

.kart h2{
    font-size:21px;
}

/* Liste */

#liste{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.kisi{
    background:#171717;
    border:1px solid #2a2a2a;
    border-radius:18px;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.sol h3{
    font-size:17px;
    margin-bottom:5px;
}

.sol p{
    color:#999;
    font-size:14px;
}

.sag{
    display:flex;
    gap:8px;
}

.durumBtn{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:#d63031;
    color:white;
}

.odendi{
    background:#00b894 !important;
}

.silBtn{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    background:#333;
    color:white;
    cursor:pointer;
}

.bos{
    text-align:center;
    color:#777;
    margin-top:20px;
}

/* Telefon */

@media(max-width:600px){

    .istatistik{
        grid-template-columns:1fr;
    }

    .kisi{
        flex-direction:column;
        align-items:flex-start;
    }

    .sag{
        width:100%;
    }

    .sag button{
        flex:1;
    }
}

</style>
</head>
<body>

<!-- Açılış Videosu -->


<!-- Site -->

<div id="site">

<h1>🎓 Mezuniyet Takip</h1>

<div class="ust">

    <input type="text" id="isimInput" placeholder="İsim gir">

    <button class="ekleBtn" onclick="kisiEkle()">
        Ekle
    </button>

</div>

<input
class="arama"
type="text"
id="aramaInput"
placeholder="İsim ara..."
onkeyup="listeyiGoster()">

<div class="istatistik">

    <div class="kart">
        <p>Toplam Kişi</p>
        <h2 id="toplamKisi">0</h2>
    </div>

    <div class="kart">
        <p>Ödeyen</p>
        <h2 id="odeyen">0</h2>
    </div>

    <div class="kart">
        <p>Toplanan</p>
        <h2 id="toplamPara">0 TL</h2>
    </div>

</div>

<div id="liste"></div>

</div>

<script>

const UCRET = 1500;

let kisiler = JSON.parse(localStorage.getItem("kisiler")) || [];

/* Açılış Videosu */

const video = document.getElementById("introVideo");

video.onended = () => {

    document.getElementById("videoEkran").style.display = "none";
    document.getElementById("site").style.display = "block";

};

/* Kaydet */

function kaydet(){

    localStorage.setItem("kisiler", JSON.stringify(kisiler));

}

/* İstatistik */

function istatistik(){

    const odeyen = kisiler.filter(x => x.odendi).length;

    document.getElementById("toplamKisi").innerText = kisiler.length;

    document.getElementById("odeyen").innerText = odeyen;

    document.getElementById("toplamPara").innerText =
        (odeyen * UCRET) + " TL";
}

/* Liste */

function listeyiGoster(){

    const liste = document.getElementById("liste");

    const arama =
        document.getElementById("aramaInput")
        .value
        .toLowerCase();

    liste.innerHTML = "";

    const filtreli = kisiler.filter(x =>
        x.isim.toLowerCase().includes(arama)
    );

    if(filtreli.length === 0){

        liste.innerHTML =
        `<div class="bos">Kayıt yok</div>`;
    }

    filtreli.forEach((kisi,index)=>{

        const gercekIndex = kisiler.indexOf(kisi);

        liste.innerHTML += `

        <div class="kisi">

            <div class="sol">

                <h3>${kisi.isim}</h3>

                <p>${UCRET} TL</p>

            </div>

            <div class="sag">

                <button
                class="durumBtn ${kisi.odendi ? 'odendi' : ''}"
                onclick="durumDegistir(${gercekIndex})">

                ${kisi.odendi ? 'Verdi' : 'Vermedi'}

                </button>

                <button
                class="silBtn"
                onclick="sil(${gercekIndex})">

                Sil

                </button>

            </div>

        </div>

        `;
    });

    istatistik();
}

/* Kişi Ekle */

function kisiEkle(){

    const input =
        document.getElementById("isimInput");

    const isim = input.value.trim();

    if(isim === "") return;

    kisiler.push({

        isim:isim,
        odendi:false

    });

    kaydet();

    listeyiGoster();

    input.value = "";
}

/* Durum */

function durumDegistir(index){

    kisiler[index].odendi =
        !kisiler[index].odendi;

    kaydet();

    listeyiGoster();
}

/* Sil */

function sil(index){

    kisiler.splice(index,1);

    kaydet();

    listeyiGoster();
}

listeyiGoster();

</script>

</body>
</html>
